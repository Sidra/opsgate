<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 590" style="font-family: system-ui, -apple-system, sans-serif; background: #0c0c0f;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Task input -->
  <rect x="220" y="20" width="240" height="44" rx="8" fill="#1e2028" stroke="#2d2f3a" stroke-width="0.5"/>
  <text x="340" y="42" text-anchor="middle" dominant-baseline="central" fill="#e8e6e3" font-size="14" font-weight="500">Task description</text>
  <line x1="340" y1="64" x2="340" y2="90" stroke="#8a8894" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent -->
  <rect x="220" y="90" width="240" height="56" rx="8" fill="#26215C" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="108" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE" font-size="14" font-weight="500">Agent (Llama-3.1-8B + LoRA)</text>
  <text x="340" y="128" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC" font-size="12">Generates JSON tool calls</text>
  <line x1="340" y1="146" x2="340" y2="172" stroke="#8a8894" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Environment container -->
  <rect x="60" y="172" width="560" height="130" rx="16" fill="#04342C" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="340" y="196" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-size="14" font-weight="500">OpsGate environment (4 enterprise tools)</text>

  <!-- Tool boxes -->
  <rect x="85" y="215" width="115" height="56" rx="8" fill="#042C53" stroke="#378ADD" stroke-width="0.5"/>
  <text x="142" y="235" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB" font-size="14" font-weight="500">CRM</text>
  <text x="142" y="253" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-size="12">Users, notes</text>

  <rect x="215" y="215" width="115" height="56" rx="8" fill="#042C53" stroke="#378ADD" stroke-width="0.5"/>
  <text x="272" y="235" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB" font-size="14" font-weight="500">Billing</text>
  <text x="272" y="253" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-size="12">Invoices, refunds</text>

  <rect x="345" y="215" width="115" height="56" rx="8" fill="#042C53" stroke="#378ADD" stroke-width="0.5"/>
  <text x="402" y="235" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB" font-size="14" font-weight="500">Calendar</text>
  <text x="402" y="253" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-size="12">Events, slots</text>

  <rect x="475" y="215" width="115" height="56" rx="8" fill="#042C53" stroke="#378ADD" stroke-width="0.5"/>
  <text x="532" y="235" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB" font-size="14" font-weight="500">Email</text>
  <text x="532" y="253" text-anchor="middle" dominant-baseline="central" fill="#85B7EB" font-size="12">Notifications</text>

  <line x1="340" y1="302" x2="340" y2="330" stroke="#8a8894" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="355" y="320" dominant-baseline="central" fill="#8a8894" font-size="12">Snapshots</text>

  <!-- Verifier container -->
  <rect x="100" y="330" width="480" height="170" rx="16" fill="#4A1B0C" stroke="#D85A30" stroke-width="0.5"/>
  <text x="340" y="354" text-anchor="middle" dominant-baseline="central" fill="#FAECE7" font-size="14" font-weight="500">Deterministic verifier (pure Python, &lt;1ms)</text>

  <!-- Scoring categories -->
  <rect x="120" y="370" width="135" height="44" rx="6" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="187" y="384" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-size="14" font-weight="500">Completion</text>
  <text x="187" y="402" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-size="12">30 pts</text>

  <rect x="270" y="370" width="135" height="44" rx="6" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="337" y="384" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-size="14" font-weight="500">Compliance</text>
  <text x="337" y="402" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-size="12">20 pts</text>

  <rect x="420" y="370" width="135" height="44" rx="6" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="487" y="384" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-size="14" font-weight="500">Efficiency</text>
  <text x="487" y="402" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-size="12">15 pts</text>

  <rect x="120" y="430" width="135" height="44" rx="6" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="187" y="444" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-size="14" font-weight="500">Notifications</text>
  <text x="187" y="462" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-size="12">15 pts</text>

  <rect x="270" y="430" width="135" height="44" rx="6" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="337" y="444" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-size="14" font-weight="500">Accuracy</text>
  <text x="337" y="462" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-size="12">10 pts</text>

  <rect x="420" y="430" width="135" height="44" rx="6" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="487" y="444" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-size="14" font-weight="500">Hygiene</text>
  <text x="487" y="462" text-anchor="middle" dominant-baseline="central" fill="#FAC775" font-size="12">10 pts</text>

  <line x1="340" y1="500" x2="340" y2="530" stroke="#8a8894" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Verdict outputs -->
  <rect x="80" y="530" width="130" height="44" rx="8" fill="#173404" stroke="#639922" stroke-width="0.5"/>
  <text x="145" y="552" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE" font-size="14" font-weight="500">PASS (≥90)</text>

  <rect x="270" y="530" width="130" height="44" rx="8" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="335" y="552" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-size="14" font-weight="500">HOLD (≥60)</text>

  <rect x="460" y="530" width="130" height="44" rx="8" fill="#501313" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="525" y="552" text-anchor="middle" dominant-baseline="central" fill="#FCEBEB" font-size="14" font-weight="500">BLOCK (&lt;60)</text>

  <!-- Reward loop -->
  <path d="M80 552 Q30 552 30 320 Q30 90 60 90 L218 90" fill="none" stroke="#639922" stroke-width="1" marker-end="url(#arrow)" opacity="0.6"/>
  <text x="18" y="320" text-anchor="middle" dominant-baseline="central" fill="#97C459" font-size="11" transform="rotate(-90,18,320)">Reward → GRPO training loop</text>
</svg>
