<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 480" style="font-family: system-ui, -apple-system, sans-serif; background: #0c0c0f;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <rect x="40" y="20" width="180" height="40" rx="8" fill="#04342C" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="130" y="40" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-size="14" font-weight="500">Environment</text>

  <rect x="250" y="20" width="180" height="40" rx="8" fill="#26215C" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="40" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE" font-size="14" font-weight="500">Agent</text>

  <rect x="460" y="20" width="180" height="40" rx="8" fill="#4A1B0C" stroke="#D85A30" stroke-width="0.5"/>
  <text x="550" y="40" text-anchor="middle" dominant-baseline="central" fill="#FAECE7" font-size="14" font-weight="500">Verifier</text>

  <!-- Swim lanes -->
  <line x1="130" y1="66" x2="130" y2="460" stroke="#2d2f3a" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="340" y1="66" x2="340" y2="460" stroke="#2d2f3a" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>
  <line x1="550" y1="66" x2="550" y2="460" stroke="#2d2f3a" stroke-width="0.5" stroke-dasharray="4 4" opacity="0.3"/>

  <!-- Step numbers -->
  <text x="22" y="102" text-anchor="middle" fill="#8a8894" font-size="12">1</text>
  <text x="22" y="176" text-anchor="middle" fill="#8a8894" font-size="12">2</text>
  <text x="22" y="244" text-anchor="middle" fill="#8a8894" font-size="12">3</text>
  <text x="22" y="318" text-anchor="middle" fill="#8a8894" font-size="12">4</text>
  <text x="22" y="400" text-anchor="middle" fill="#8a8894" font-size="12">5</text>

  <!-- Step 1: reset -->
  <rect x="55" y="80" width="150" height="44" rx="6" fill="#04342C" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="130" y="94" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-size="14" font-weight="500">reset(task)</text>
  <text x="130" y="112" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" font-size="12">Seed tools, set target</text>
  <line x1="205" y1="102" x2="260" y2="102" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 1b: Agent reads -->
  <rect x="262" y="80" width="156" height="44" rx="6" fill="#26215C" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="94" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE" font-size="14" font-weight="500">Read task</text>
  <text x="340" y="112" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC" font-size="12">Parse description</text>

  <!-- Step 2: Agent generates call -->
  <rect x="262" y="150" width="156" height="52" rx="6" fill="#26215C" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="168" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE" font-size="14" font-weight="500">Generate tool call</text>
  <text x="340" y="186" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC" font-size="12">{"tool", "action", ...}</text>
  <line x1="262" y1="176" x2="205" y2="176" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 2b: Environment executes -->
  <rect x="55" y="154" width="150" height="44" rx="6" fill="#04342C" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="130" y="168" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-size="14" font-weight="500">Execute call</text>
  <text x="130" y="186" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" font-size="12">Update SQLite state</text>
  <line x1="205" y1="218" x2="260" y2="218" stroke="#1D9E75" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="232" y="212" text-anchor="middle" fill="#8a8894" font-size="11">Result</text>

  <!-- Step 3: Repeat loop -->
  <rect x="55" y="222" width="363" height="40" rx="6" fill="#1e2028" stroke="#2d2f3a" stroke-width="0.5"/>
  <text x="236" y="236" text-anchor="middle" dominant-baseline="central" fill="#e8e6e3" font-size="14" font-weight="500">Repeat 3-8 tool calls per episode</text>
  <text x="236" y="252" text-anchor="middle" dominant-baseline="central" fill="#8a8894" font-size="12">Agent ↔ Environment interaction loop</text>

  <!-- Step 4: Submit -->
  <rect x="262" y="290" width="156" height="52" rx="6" fill="#26215C" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="308" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE" font-size="14" font-weight="500">Submit</text>
  <text x="340" y="328" text-anchor="middle" dominant-baseline="central" fill="#AFA9EC" font-size="12">{"tool": "system"}</text>
  <line x1="418" y1="316" x2="468" y2="316" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 4: Environment snapshot -->
  <rect x="55" y="290" width="150" height="52" rx="6" fill="#04342C" stroke="#1D9E75" stroke-width="0.5"/>
  <text x="130" y="308" text-anchor="middle" dominant-baseline="central" fill="#E1F5EE" font-size="14" font-weight="500">Snapshot state</text>
  <text x="130" y="328" text-anchor="middle" dominant-baseline="central" fill="#5DCAA5" font-size="12">All 4 tool databases</text>
  <path d="M205 316 L230 316 L230 375 L468 375" fill="none" stroke="#1D9E75" stroke-width="1" marker-end="url(#arrow)" stroke-dasharray="4 3"/>
  <text x="348" y="368" text-anchor="middle" fill="#8a8894" font-size="11">Snapshots</text>

  <!-- Step 4b: Verifier compares -->
  <rect x="470" y="290" width="160" height="52" rx="6" fill="#4A1B0C" stroke="#D85A30" stroke-width="0.5"/>
  <text x="550" y="308" text-anchor="middle" dominant-baseline="central" fill="#FAECE7" font-size="14" font-weight="500">Compare states</text>
  <text x="550" y="328" text-anchor="middle" dominant-baseline="central" fill="#F0997B" font-size="12">Target vs actual</text>
  <line x1="550" y1="342" x2="550" y2="372" stroke="#D85A30" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Step 5: Verdict -->
  <rect x="470" y="374" width="160" height="52" rx="6" fill="#173404" stroke="#639922" stroke-width="0.5"/>
  <text x="550" y="392" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE" font-size="14" font-weight="500">PASS (96/100)</text>
  <text x="550" y="412" text-anchor="middle" dominant-baseline="central" fill="#97C459" font-size="12">+ full audit trail</text>

  <!-- Reward back to agent -->
  <line x1="470" y1="400" x2="418" y2="400" stroke="#639922" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="444" y="392" text-anchor="middle" fill="#97C459" font-size="11">Reward</text>

  <!-- Bottom caption -->
  <text x="340" y="452" text-anchor="middle" fill="#8a8894" font-size="12">One episode = one task. Deterministic scoring. No LLM judge.</text>
</svg>
