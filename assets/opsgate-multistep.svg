<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 320" style="font-family: system-ui, -apple-system, sans-serif; background: #0c0c0f;">
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text x="340" y="22" text-anchor="middle" dominant-baseline="central" fill="#e8e6e3" font-size="14" font-weight="500">Multi-step workflow: full_offboard (7 tool calls)</text>
