<svg xmlns="http://www.w3.org/2000/svg" width="680" viewBox="0 0 680 500" style="font-family: system-ui, -apple-system, sans-serif; background: #0c0c0f;">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Outer container -->
  <rect x="20" y="16" width="640" height="468" rx="16" fill="#1e2028" stroke="#2d2f3a" stroke-width="0.5"/>
  <text x="340" y="44" text-anchor="middle" dominant-baseline="central" fill="#e8e6e3" font-size="14" font-weight="500">SFT + GRPO training pipeline</text>

  <!-- Base model -->
  <rect x="120" y="60" width="440" height="36" rx="6" fill="#26215C" stroke="#7F77DD" stroke-width="0.5"/>
  <text x="340" y="78" text-anchor="middle" dominant-baseline="central" fill="#EEEDFE" font-size="14" font-weight="500">Llama-3.1-8B-Instruct (4-bit NF4)</text>
  <line x1="340" y1="96" x2="340" y2="120" stroke="#7F77DD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 1: SFT -->
  <rect x="40" y="120" width="280" height="230" rx="10" fill="#042C53" stroke="#378ADD" stroke-width="0.5"/>
  <text x="140" y="144" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB" font-size="14" font-weight="500">Phase 1: SFT warmup</text>
  <!-- Timing badge -->
  <rect x="200" y="130" width="100" height="22" rx="11" fill="#173404" stroke="#639922" stroke-width="0.5"/>
  <text x="250" y="141" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE" font-size="12">34 seconds</text>

  <text x="60" y="174" dominant-baseline="central" fill="#85B7EB" font-size="12">25 gold demonstrations</text>
  <text x="60" y="194" dominant-baseline="central" fill="#85B7EB" font-size="12">(task → correct JSON tool calls)</text>
  <text x="60" y="222" dominant-baseline="central" fill="#85B7EB" font-size="12" opacity="0.6">Teaches format:</text>

  <rect x="60" y="234" width="240" height="52" rx="4" fill="#1e2028" stroke="#2d2f3a" stroke-width="0.5"/>
  <text x="72" y="250" dominant-baseline="central" fill="#8a8894" font-size="12">{"tool": "crm",</text>
  <text x="72" y="268" dominant-baseline="central" fill="#8a8894" font-size="12"> "action": "update", ...}</text>

  <text x="60" y="306" dominant-baseline="central" fill="#85B7EB" font-size="12" opacity="0.6">LoRA r=16, α=32</text>
  <text x="60" y="324" dominant-baseline="central" fill="#85B7EB" font-size="12" opacity="0.6">5 epochs, lr=2e-4</text>

  <!-- Arrow between phases -->
  <line x1="320" y1="235" x2="358" y2="235" stroke="#378ADD" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Phase 2: GRPO -->
  <rect x="360" y="120" width="280" height="230" rx="10" fill="#4A1B0C" stroke="#D85A30" stroke-width="0.5"/>
  <text x="460" y="144" text-anchor="middle" dominant-baseline="central" fill="#FAECE7" font-size="14" font-weight="500">Phase 2: GRPO</text>
  <!-- Timing badge -->
  <rect x="520" y="130" width="100" height="22" rx="11" fill="#173404" stroke="#639922" stroke-width="0.5"/>
  <text x="570" y="141" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE" font-size="12">15 minutes</text>

  <text x="380" y="174" dominant-baseline="central" fill="#F0997B" font-size="12">Graduated reward shaping:</text>

  <!-- Reward scale -->
  <rect x="380" y="186" width="44" height="20" rx="4" fill="#501313" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="402" y="196" text-anchor="middle" dominant-baseline="central" fill="#FCEBEB" font-size="12">-0.5</text>
  <text x="432" y="196" dominant-baseline="central" fill="#F0997B" font-size="12">No valid JSON</text>

  <rect x="380" y="212" width="44" height="20" rx="4" fill="#501313" stroke="#E24B4A" stroke-width="0.5"/>
  <text x="402" y="222" text-anchor="middle" dominant-baseline="central" fill="#FCEBEB" font-size="12">-0.3</text>
  <text x="432" y="222" dominant-baseline="central" fill="#F0997B" font-size="12">Wrong schema</text>

  <rect x="380" y="238" width="44" height="20" rx="4" fill="#1e2028" stroke="#2d2f3a" stroke-width="0.5"/>
  <text x="402" y="248" text-anchor="middle" dominant-baseline="central" fill="#e8e6e3" font-size="12">0.0</text>
  <text x="432" y="248" dominant-baseline="central" fill="#F0997B" font-size="12">Valid but incomplete</text>

  <rect x="380" y="264" width="44" height="20" rx="4" fill="#412402" stroke="#EF9F27" stroke-width="0.5"/>
  <text x="402" y="274" text-anchor="middle" dominant-baseline="central" fill="#FAEEDA" font-size="12">0.1+</text>
  <text x="432" y="274" dominant-baseline="central" fill="#F0997B" font-size="12">Partial completion</text>

  <rect x="380" y="290" width="44" height="20" rx="4" fill="#173404" stroke="#639922" stroke-width="0.5"/>
  <text x="402" y="300" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE" font-size="12">1.0</text>
  <text x="432" y="300" dominant-baseline="central" fill="#F0997B" font-size="12">Full PASS</text>

  <text x="380" y="332" dominant-baseline="central" fill="#F0997B" font-size="12" opacity="0.6">5 epochs, lr=5e-6, 4 gen/batch</text>

  <!-- Result arrow -->
  <line x1="340" y1="350" x2="340" y2="380" stroke="#8a8894" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Result box -->
  <rect x="140" y="380" width="400" height="52" rx="8" fill="#173404" stroke="#639922" stroke-width="0.5"/>
  <text x="340" y="398" text-anchor="middle" dominant-baseline="central" fill="#EAF3DE" font-size="14" font-weight="500">55.6 → 97.1 avg · 24/25 PASS · 0 BLOCK</text>
  <text x="340" y="418" text-anchor="middle" dominant-baseline="central" fill="#97C459" font-size="12">16 minutes total on single H100</text>

  <!-- Bottom info -->
  <text x="340" y="458" text-anchor="middle" fill="#8a8894" font-size="11" opacity="0.5">LoRA targets: q/k/v/o_proj + gate/up/down_proj · All rewards from deterministic verifier</text>
</svg>
